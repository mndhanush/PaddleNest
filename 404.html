    <script>
        const htmlElement = document.documentElement;
        const desktopThemeToggleBtn = document.getElementById('desktop-theme-toggle-btn');
        const desktopRtlToggleBtn = document.getElementById('desktop-rtl-toggle-btn');

        // Initialize Theme
        const currentTheme = localStorage.getItem('theme') || 'light';
        htmlElement.setAttribute('data-theme', currentTheme);
        if (currentTheme === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlElement.classList.add('dark');
        }

        // Toggle Theme
        function toggleTheme() {
            htmlElement.classList.toggle('dark');
            const isDark = htmlElement.classList.contains('dark');
            const newTheme = isDark ? 'dark' : 'light';
            
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        if (desktopThemeToggleBtn) {
            desktopThemeToggleBtn.addEventListener('click', toggleTheme);
        }

        // Initialize RTL
        const currentDir = localStorage.getItem('direction') || 'ltr';
        htmlElement.setAttribute('dir', currentDir);

        // Toggle RTL
        function toggleRTL() {
            const direction = htmlElement.getAttribute('dir') === 'rtl' ? 'ltr' : 'rtl';
            htmlElement.setAttribute('dir', direction);
            localStorage.setItem('direction', direction);
        }
        
        if (desktopRtlToggleBtn) {
            desktopRtlToggleBtn.addEventListener('click', toggleRTL);
        }
    </script>
